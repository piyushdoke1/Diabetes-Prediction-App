<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Predictor</title>
    <style>
        body {
            background-color: #e6f2ff;
            font-family: Arial, sans-serif;
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #004080;
            font-size: 36px;
            margin-bottom: 20px;
        }

        form {
            display: inline-block;
            text-align: left;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        label {
            font-size: 18px;
            margin-top: 10px;
            display: block;
            color: #003366;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .radio-group {
            margin-bottom: 20px;
        }

        .radio-group label {
            display: inline-block;
            margin-right: 20px;
            font-size: 16px;
        }

        .submit-btn {
            background-color: #004080;
            color: white;
            padding: 10px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #0059b3;
        }

        .result {
            font-size: 24px;
            margin-top: 30px;
            color: green;
        }
    </style>
</head>
<body>
    <h1>Diabetes Prediction App</h1>
    <form method="post">
        <label>Age:</label>
        <input type="number" name="age" step="any" required>

        <label>BMI:</label>
        <input type="number" name="bmi" step="any" required>

        <label>Fasting Sugar:</label>
        <input type="number" name="fs" step="any" required>

        <label>HBA1C:</label>
        <input type="number" name="hb" step="any" required>

        <div class="radio-group">
            <label>Gender:</label>
            <label><input type="radio" name="gender" value="1" required> Female</label>
            <label><input type="radio" name="gender" value="2"> Male</label>
        </div>

        <div class="radio-group">
            <label>Hypertension:</label>
            <label><input type="radio" name="hypertension" value="1" required> No</label>
            <label><input type="radio" name="hypertension" value="2"> Yes</label>
        </div>

        <div class="radio-group">
            <label>Family History of Diabetes:</label>
            <label><input type="radio" name="family" value="1" required> No</label>
            <label><input type="radio" name="family" value="2"> Yes</label>
        </div>

        <button type="submit" class="submit-btn">Predict</button>
    </form>

    {% if result %}
        <div class="result">Result: {{ result }}</div>
    {% endif %}
</body>
</html>
